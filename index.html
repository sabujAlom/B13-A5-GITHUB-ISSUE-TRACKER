<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GitHub Issues Tracker</title>
    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
    />

    <!-- css link -->
     <link rel="./tailwind.init.css" href="">
  </head>

  <body class="bg-gray-100">
    <!-- NAVBAR -->

    <div class="navbar bg-white shadow px-10">
      <div class="flex-1 flex items-center gap-2">
        <img
          src="./assets/github-logo.png"
          class="w-7"
        />

        <h1 class="font-semibold text-lg text-neutral-700">GitHub Issues Tracker</h1>
      </div>

      <div class="flex gap-3">
        <input
          id="searchInput"
          placeholder="Search issues..."
          class="input input-bordered input-sm w-64"
        />

        <button onclick="searchIssue()" class="btn btn-sm btn-outline">
          Search
        </button>

        <button class="btn btn-sm btn-primary text-white">+ New Issue</button>
      </div>
    </div>

    <!-- CONTENT -->

    <div class="max-w-7xl mx-auto mt-8">
      <div class="bg-white rounded-lg shadow p-6">


        <!-- TAB BAR -->

        <div class="tabs tabs-boxed mb-6 ">
          <button
            onclick="loadIssues('all')"
            id="allTab"
            class="tab tab-active "
          >
            All
          </button>

          <button onclick="loadIssues('open')" id="openTab" class="tab">
            Open
          </button>

          <button onclick="loadIssues('closed')" id="closedTab" class="tab">
            Closed
          </button>
        </div>

        <!-- ISSUE HEADER -->

        <div class="flex justify-between items-center mb-6">
          <div class="flex gap-1">
             <div class="flex justify-center items-center ">
                 <img class="w-6 h-6" src="./assets/Aperture.png" alt="" />
             </div>
            <div>
              <p class="font-semibold text-neutral-700" id="issueCount">0 Issues</p>

              <p class="text-sm text-gray-500">
                Track and manage project issues
              </p>
            </div>
          </div>

          <div class="flex gap-4 text-sm">
            <div class="flex items-center gap-2">
              <span class="w-4 h-4 bg-green-500 rounded-full"></span>
              Open
            </div>

            <div class="flex items-center gap-2">
              <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
              Closed
            </div>
          </div>
        </div>

        <!-- ISSUE GRID -->

        <div
          id="issuesContainer"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5"
        ></div>
      </div>
    </div>

    <!-- MODAL -->

    <dialog id="issueModal" class="modal p-8">
      <div class="modal-box">
        <h3 id="modalTitle" class="font-bold text-lg"></h3>

        <div class="flex gap-2 mt-2 mb-3">
          <span id="modalPriority" class="badge badge-outline"></span>

          <span id="modalStatus" class="badge"></span>
        </div>

        <p id="modalDescription" class="text-sm text-gray-600 mb-4"></p>

        <p class="text-sm">
          <b>Author:</b>
          <span id="modalAuthor"></span>
        </p>

        <p class="text-sm">
          <b>Created:</b>
          <span id="modalDate"></span>
        </p>

        <div class="modal-action">
          <form method="dialog">
            <button class="btn btn-sm btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="login.js"></script>
  </body>
</html>
