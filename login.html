<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign In - GitHub Issues Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
    />

    <!-- link css -->
     <link rel="./tailwind.init.css" href="">
  </head>

  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="card w-96 bg-white shadow-xl p-8">
      <div class="flex justify-center mb-4">
        <img
          src="./assets/github-logo.png"
          class="w-20 h-20"
        />
      </div>

      <h2 class="text-center text-neutral text-2xl font-bold text-neutral-700">
        GitHub Issues Tracker
      </h2>
      <p class="text-center text-gray-500 mb-6">
        Sign in to manage your issues
      </p>

      <input
        id="username"
        type="text"
        placeholder="Username"
        class="input input-bordered w-full mb-1"
      />
      <br />

      <input
        id="password"
        type="password"
        placeholder="Password"
        class="input input-bordered w-full mb-4"
      />

      <button onclick="login()" class="btn btn-primary w-full text-white">Sign In</button>
      <hr />

      <p class="text-center text-sm text-gray-500 mt-4">
        Demo: <b>admin / admin123</b>
      </p>
    </div>

    <script src="./login.js"></script>
  </body>
</html>
